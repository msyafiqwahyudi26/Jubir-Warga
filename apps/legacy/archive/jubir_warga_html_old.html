  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; }
    html { scroll-behavior: smooth; }
    body { background: #FFFAEE; color: #2A2D3A; font-family: 'Inter', sans-serif; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #FFFAEE; }
    ::-webkit-scrollbar-thumb { background: #E6DECB; border-radius: 4px; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    /* Card hover */
    .card-lift { transition: transform 0.18s ease, box-shadow 0.18s ease; }
    .card-lift:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(26,34,86,.10); }

    /* Wordle tiles */
    .wtile {
      width: 54px; height: 54px;
      border: 2px solid #E6DECB;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Vollkorn', serif;
      font-size: 26px; font-weight: 700;
      text-transform: uppercase;
      transition: border-color .1s, transform .1s;
      user-select: none;
    }
    @media (max-width: 420px) {
      .wtile { width: 44px; height: 44px; font-size: 20px; }
    }
    .wkey {
      height: 48px; min-width: 30px; padding: 0 6px;
      border-radius: 6px; border: none; cursor: pointer;
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      transition: filter .1s, transform .08s;
      user-select: none;
    }
    .wkey:hover  { filter: brightness(.88); }
    .wkey:active { transform: scale(.93); }

    @keyframes flip-in  { 0%{transform:rotateX(0)}  50%{transform:rotateX(90deg)} }
    @keyframes flip-out { 50%{transform:rotateX(90deg)} 100%{transform:rotateX(0)} }
    @keyframes tile-pop { 0%{transform:scale(1)} 50%{transform:scale(1.13)} 100%{transform:scale(1)} }
    @keyframes row-shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
    .flip-tile { animation: flip-in .25s ease forwards, flip-out .25s ease .25s forwards; }
    .tile-pop  { animation: tile-pop .12s ease; }
    .row-shake { animation: row-shake .4s ease; }

    /* Sticky note tilt */
    .sticky-a { transform: rotate(-1.2deg); }
    .sticky-b { transform: rotate( 1.0deg); }

    /* Squiggly underline */
    .squiggly { text-decoration: underline wavy #E8632B; text-decoration-skip-ink: none; text-underline-offset: 4px; }

    /* Badge shimmer */
    @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:.55} }
    .badge-glow { animation: shimmer 2.4s ease-in-out infinite; }

    /* Button ripple */
    .btn-base { position: relative; overflow: hidden; transition: transform .1s, filter .1s; }
    .btn-base:active { transform: scale(.97); }

    /* Range input */
    input[type=range] { accent-color: #E8632B; }

    /* Line clamp */
    .clamp2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
