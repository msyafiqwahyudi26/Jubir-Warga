<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jubir Warga — Suara warga, rumahnya di sini.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
  <link href="https://fonts.googleapis.com/css2?family=Vollkorn:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Inter:wght@300;400;500;600;700&family=Caveat:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'bb':   '#1A2256',
            'bc':   '#FFFAEE',
            'bbs':  '#3B4A8A',
            'ig':   '#2A2D3A',
            'ln':   '#E6DECB',
            'coral':'#E8632B',
            'marigold':'#F2B137',
            'mint': '#7FB69E',
          },
          fontFamily: {
            display: ['Vollkorn','serif'],
            hand:    ['Caveat','cursive'],
            mono:    ['Fira Code','monospace'],
          },
        },
      },
    };
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; }
    html { scroll-behavior: smooth; }
    body { background: #FFFAEE; color: #2A2D3A; font-family: 'Inter', sans-serif; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #FFFAEE; }
    ::-webkit-scrollbar-thumb { background: #E6DECB; border-radius: 4px; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    /* Card hover */
    .card-lift { transition: transform 0.18s ease, box-shadow 0.18s ease; }
    .card-lift:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(26,34,86,.10); }

    /* Wordle tiles */
    .wtile {
      width: 54px; height: 54px;
      border: 2px solid #E6DECB;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Vollkorn', serif;
      font-size: 26px; font-weight: 700;
      text-transform: uppercase;
      transition: border-color .1s, transform .1s;
      user-select: none;
    }
    @media (max-width: 420px) {
      .wtile { width: 44px; height: 44px; font-size: 20px; }
    }
    .wkey {
      height: 48px; min-width: 30px; padding: 0 6px;
      border-radius: 6px; border: none; cursor: pointer;
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      transition: filter .1s, transform .08s;
      user-select: none;
    }
    .wkey:hover  { filter: brightness(.88); }
    .wkey:active { transform: scale(.93); }

    @keyframes flip-in  { 0%{transform:rotateX(0)}  50%{transform:rotateX(90deg)} }
    @keyframes flip-out { 50%{transform:rotateX(90deg)} 100%{transform:rotateX(0)} }
    @keyframes tile-pop { 0%{transform:scale(1)} 50%{transform:scale(1.13)} 100%{transform:scale(1)} }
    @keyframes row-shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
    .flip-tile { animation: flip-in .25s ease forwards, flip-out .25s ease .25s forwards; }
    .tile-pop  { animation: tile-pop .12s ease; }
    .row-shake { animation: row-shake .4s ease; }

    /* Sticky note tilt */
    .sticky-a { transform: rotate(-1.2deg); }
    .sticky-b { transform: rotate( 1.0deg); }

    /* Squiggly underline */
    .squiggly { text-decoration: underline wavy #E8632B; text-decoration-skip-ink: none; text-underline-offset: 4px; }

    /* Badge shimmer */
    @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:.55} }
    .badge-glow { animation: shimmer 2.4s ease-in-out infinite; }

    /* Button ripple */
    .btn-base { position: relative; overflow: hidden; transition: transform .1s, filter .1s; }
    .btn-base:active { transform: scale(.97); }

    /* Range input */
    input[type=range] { accent-color: #E8632B; }

    /* Line clamp */
    .clamp2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <style>
    #__loading {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      background: #FFFAEE; z-index: 9999; flex-direction: column; gap: 16px;
      font-family: 'Vollkorn', serif; color: #1A2256;
    }
    #__loading.gone { display: none; }
    #__loading p { margin: 0; font-size: 18px; font-style: italic; }
    #__loading small { font-size: 12px; color: #6B6860; font-family: monospace; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #__loading svg { animation: spin 1.5s linear infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="__loading">
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#E8632B" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="10" stroke-dasharray="40 40" />
    </svg>
    <p>Lagi nyalain Jubir Warga…</p>
    <small id="__loading-status">memuat React + Babel…</small>
  </div>
  <script>
    // Hide loading when root has children (after React mounts)
    (function(){
      var ls = document.getElementById('__loading-status');
      var attempts = 0;
      var t = setInterval(function(){
        var root = document.getElementById('root');
        if (root && root.children && root.children.length > 0) {
          var ld = document.getElementById('__loading');
          if (ld) ld.classList.add('gone');
          clearInterval(t);
        } else {
          attempts++;
          if (attempts === 3)  ls.textContent = 'mengompilasi JSX…';
          if (attempts === 8)  ls.textContent = 'render komponen…';
          if (attempts === 20) ls.textContent = 'Hmm, lama nih. Buka DevTools (F12) untuk cek error.';
        }
      }, 500);
    })();
    window.addEventListener('error', function(e){
      var ls = document.getElementById('__loading-status');
      if (ls) ls.textContent = 'Error: ' + (e.message || e.error);
      console.error('[Jubir Warga]', e);
    });
  </script>

<script type="text/babel" data-presets="react" data-type="module">
// === components.jsx ===
// COMPONENTS — shared across all pages

const { useState, useEffect } = React;

const C = {
  blue:     '#1A2256',
  cream:    '#FFFAEE',
  blueSoft: '#3B4A8A',
  ink:      '#2A2D3A',
  line:     '#E6DECB',
  coral:    '#E8632B',
  marigold: '#F2B137',
  mint:     '#7FB69E',
};

// ── Pill ──────────────────────────────────────────────
function Pill({ color = 'blue', children, className = '' }) {
  const map = {
    blue:     { bg: '#E8ECF7', text: '#1A2256', border: '#C4CCEB' },
    coral:    { bg: '#FCE9E1', text: '#B84A1A', border: '#E8632B' },
    marigold: { bg: '#FEF3D9', text: '#9A6500', border: '#F2B137' },
    mint:     { bg: '#E1F2EC', text: '#2C7A5C', border: '#7FB69E' },
    grey:     { bg: '#F0EDE8', text: '#6B6860', border: '#E6DECB' },
  };
  const s = map[color] || map.blue;
  return (
    <span
      className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium border flex-shrink-0 ${className}`}
      style={{ background: s.bg, color: s.text, borderColor: s.border }}
    >
      {children}
    </span>
  );
}

// ── Button ────────────────────────────────────────────
function Button({ variant = 'primary', size = 'md', onClick, children, className = '', disabled = false }) {
  const sz = { sm: 'px-3.5 py-1.5 text-xs', md: 'px-5 py-2.5 text-sm', lg: 'px-7 py-3.5 text-base' }[size];
  const base = `btn-base rounded-xl inline-flex items-center gap-1.5 font-semibold cursor-pointer select-none ${sz} ${className}`;
  const vs = {
    primary:       { background: C.blue,   color: C.cream,  border: 'none' },
    coral:         { background: C.coral,  color: '#fff',   border: 'none' },
    outline:       { background: 'transparent', color: C.blue,  border: `2px solid ${C.blue}` },
    ghost:         { background: 'transparent', color: C.blue,  border: 'none' },
    'outline-coral': { background: 'transparent', color: C.coral, border: `2px solid ${C.coral}` },
    'outline-light': { background: 'transparent', color: C.ink+'99', border: `1.5px solid ${C.line}` },
  };
  const st = vs[variant] || vs.primary;
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      className={base}
      style={{ ...st, opacity: disabled ? .4 : 1, cursor: disabled ? 'not-allowed' : 'pointer' }}
    >
      {children}
    </button>
  );
}

// ── UserAvatar ────────────────────────────────────────
function UserAvatar({ name = 'U', size = 'md', level = 3, showLevel = true, className = '' }) {
  const sz = { sm: 32, md: 40, lg: 56, xl: 80 }[size] || 40;
  const fs = { sm: 12, md: 14, lg: 18, xl: 26 }[size] || 14;
  const initials = name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  const hue = (name.charCodeAt(0) * 37 + (name.charCodeAt(1) || 0) * 11) % 360;
  return (
    <div className={`relative inline-block flex-shrink-0 ${className}`}>
      <div
        className="rounded-full flex items-center justify-center font-semibold text-white"
        style={{ width: sz, height: sz, fontSize: fs, background: `hsl(${hue},42%,40%)` }}
      >
        {initials}
      </div>
      {showLevel && (
        <span
          className="absolute -bottom-0.5 -right-0.5 badge-glow text-white font-bold rounded-full flex items-center justify-center leading-none"
          style={{ width: 16, height: 16, fontSize: 9, background: C.marigold }}
        >
          {level}
        </span>
      )}
    </div>
  );
}

// ── ProgressBar ───────────────────────────────────────
function ProgressBar({ percent = 0, colorKey = 'blue', className = '' }) {
  const col = { blue: C.blue, coral: C.coral, mint: C.mint, marigold: C.marigold }[colorKey] || C.blue;
  return (
    <div className={`w-full h-2 rounded-full overflow-hidden ${className}`} style={{ background: C.line }}>
      <div className="h-full rounded-full transition-all duration-700" style={{ width: `${Math.min(100, percent)}%`, background: col }} />
    </div>
  );
}

// ── StatBlock ─────────────────────────────────────────
function StatBlock({ label, value }) {
  return (
    <div className="flex flex-col items-center gap-0.5">
      <span className="font-mono font-bold text-xl" style={{ color: C.blue }}>{value}</span>
      <span className="text-xs text-center leading-tight" style={{ color: C.ink + '77' }}>{label}</span>
    </div>
  );
}

// ── NavTabs ───────────────────────────────────────────
function NavTabs({ items, active, onChange, className = '' }) {
  return (
    <div className={`flex border-b overflow-x-auto scrollbar-hide ${className}`} style={{ borderColor: C.line }}>
      {items.map(it => (
        <button
          key={it.id}
          onClick={() => onChange(it.id)}
          className="px-4 py-2.5 text-sm font-medium whitespace-nowrap border-b-2 -mb-px transition-colors"
          style={{
            borderColor: active === it.id ? C.coral : 'transparent',
            color:       active === it.id ? C.coral : C.ink + '88',
          }}
        >
          {it.label}
        </button>
      ))}
    </div>
  );
}

// ── HeroSection ───────────────────────────────────────
function HeroSection({ title, subtitle, actions, className = '' }) {
  return (
    <section className={`py-12 border-b ${className}`} style={{ borderColor: C.line }}>
      <div className="max-w-6xl mx-auto px-6">
        {title && (
          <h1 className="font-display font-bold leading-tight text-4xl md:text-5xl" style={{ color: C.blue }}>
            {title}
          </h1>
        )}
        {subtitle && (
          <p className="mt-3 text-base md:text-lg max-w-2xl" style={{ color: C.ink + '99' }}>{subtitle}</p>
        )}
        {actions && <div className="mt-5 flex flex-wrap gap-3">{actions}</div>}
      </div>
    </section>
  );
}

// ── Modal ─────────────────────────────────────────────
function Modal({ open, onClose, children, maxW = 'max-w-lg' }) {
  useEffect(() => {
    document.body.style.overflow = open ? 'hidden' : '';
    return () => { document.body.style.overflow = ''; };
  }, [open]);
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
      <div
        className="absolute inset-0 backdrop-blur-sm"
        style={{ background: C.blue + '88' }}
        onClick={onClose}
      />
      <div
        className={`relative rounded-2xl shadow-2xl ${maxW} w-full overflow-y-auto`}
        style={{ background: C.cream, maxHeight: '92vh' }}
      >
        {children}
      </div>
    </div>
  );
}

// ── Header ────────────────────────────────────────────
function Header({ currentPage, onNavigate }) {
  const [mOpen, setMOpen] = useState(false);

  // Lucide-style line icons (inline SVG)
  const I = (path) => (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      {path}
    </svg>
  );
  const Icons = {
    home:    I(<><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>),
    msg:     I(<path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8z"/>),
    edit:    I(<><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4z"/></>),
    book:    I(<><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></>),
    zap:     I(<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>),
    clip:    I(<><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></>),
    game:    I(<><line x1="6" y1="11" x2="10" y2="11"/><line x1="8" y1="9" x2="8" y2="13"/><line x1="15" y1="12" x2="15.01" y2="12"/><line x1="18" y1="10" x2="18.01" y2="10"/><path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258A4 4 0 0 0 17.32 5z"/></>),
    user:    I(<><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>),
  };

  const navItems = [
    { id: 'beranda',   label: 'Beranda',     icon: Icons.home },
    { id: 'komunitas', label: 'Komunitas',   icon: Icons.msg  },
    { id: 'karya',     label: 'Karya',       icon: Icons.edit },
    { id: 'kelas',     label: 'Kelas',       icon: Icons.book },
    { id: 'aksi',      label: 'Aksi',        icon: Icons.zap  },
    { id: 'tagih',     label: 'Tagih Janji', icon: Icons.clip },
    { id: 'main',      label: 'Main',        icon: Icons.game },
  ];

  const bottomNav = [
    { id: 'beranda',   label: 'Beranda',   icon: Icons.home },
    { id: 'komunitas', label: 'Forum',     icon: Icons.msg  },
    { id: 'tagih',     label: 'Janji',     icon: Icons.clip },
    { id: 'nala',      label: 'Nala',      icon: Icons.msg  },
    { id: 'profil',    label: 'Profil',    icon: Icons.user },
  ];

  return (
    <>
      <header
        className="sticky top-0 z-40 border-b"
        style={{ height: 64, background: C.cream, borderColor: C.line }}
      >
        <div className="max-w-6xl mx-auto px-4 md:px-6 h-full flex items-center gap-4">
          {/* Logo */}
          <button onClick={() => onNavigate('beranda')} className="flex-shrink-0 flex flex-col leading-none">
            <span className="font-hand text-2xl font-bold" style={{ color: C.blue }}>Jubir Warga</span>
            <svg viewBox="0 0 90 7" width="90" height="7" style={{ marginTop: -2 }}>
              <path d="M2,5 Q22,1 45,4 Q68,7 88,3" stroke={C.coral} strokeWidth="2.5" fill="none" strokeLinecap="round" />
            </svg>
          </button>

          {/* Desktop nav */}
          <nav className="hidden md:flex items-center gap-0.5 flex-1 justify-center">
            {navItems.map(n => (
              <button
                key={n.id}
                onClick={() => onNavigate(n.id)}
                className="px-3 py-1.5 rounded-lg text-sm font-medium transition-all flex items-center gap-1.5"
                style={{
                  background: currentPage === n.id ? C.blue : 'transparent',
                  color:      currentPage === n.id ? C.cream : C.ink,
                }}
              >
                {n.icon}
                {n.label}
              </button>
            ))}
          </nav>

          {/* Right actions */}
          <div className="flex items-center gap-2 ml-auto">
            <button className="relative w-9 h-9 rounded-full hover:bg-black/5 flex items-center justify-center" style={{ color: C.ink }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 0 1-3.46 0" />
              </svg>
              <span className="absolute top-2 right-2 w-1.5 h-1.5 rounded-full" style={{ background: C.coral }} />
            </button>
            <button
              onClick={() => onNavigate('nala')}
              className="hidden sm:flex btn-base rounded-full pl-1 pr-3.5 py-0.5 text-xs font-semibold border-2 transition-all items-center gap-1.5"
              style={{ borderColor: C.coral, background: C.cream, color: C.coral }}
              title="Tanya Nala — AI sahabatmu"
            >
              <span style={{ display: 'inline-flex', alignItems: 'center' }}>
                {/* Mini Nala bird icon */}
                <svg width="22" height="22" viewBox="0 0 28 28">
                  <ellipse cx="14" cy="16" rx="8" ry="7" fill={C.blue}/>
                  <ellipse cx="14" cy="17" rx="5" ry="4.5" fill={C.cream} opacity="0.9"/>
                  <ellipse cx="14" cy="10" rx="6.5" ry="6" fill={C.blue}/>
                  <ellipse cx="11" cy="9" rx="1.5" ry="1.5" fill="#fff"/>
                  <ellipse cx="11.3" cy="9.3" rx="0.7" ry="0.7" fill={C.blue}/>
                  <path d="M17 10 L22 12 L17 14 Z" fill={C.marigold}/>
                  <ellipse cx="13" cy="4" rx="1.5" ry="2.5" fill={C.coral}/>
                </svg>
              </span>
              Nala
            </button>
            <button onClick={() => onNavigate('profil')}>
              <UserAvatar name="Aulia Pratiwi" size="sm" level={3} />
            </button>
            <button
              className="md:hidden w-9 h-9 flex items-center justify-center"
              onClick={() => setMOpen(!mOpen)}
            >
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={C.ink} strokeWidth="2">
                <line x1="3" y1="6"  x2="21" y2="6" />
                <line x1="3" y1="12" x2="21" y2="12" />
                <line x1="3" y1="18" x2="21" y2="18" />
              </svg>
            </button>
          </div>
        </div>

        {/* Mobile dropdown */}
        {mOpen && (
          <div
            className="md:hidden absolute top-full left-0 right-0 border-b shadow-lg z-50"
            style={{ background: C.cream, borderColor: C.line }}
          >
            {[...navItems, { id: 'nala', label: 'Tanya Nala', icon: Icons.msg }, { id: 'profil', label: 'Profil Saya', icon: Icons.user }].map(n => (
              <button
                key={n.id}
                onClick={() => { onNavigate(n.id); setMOpen(false); }}
                className="w-full text-left px-6 py-3 text-sm font-medium border-b flex items-center gap-2"
                style={{ borderColor: C.line + '60', color: currentPage === n.id ? C.coral : C.ink }}
              >
                {n.icon}
                {n.label}
              </button>
            ))}
          </div>
        )}
      </header>

      {/* Mobile bottom nav */}
      <nav
        className="md:hidden fixed bottom-0 left-0 right-0 z-40 border-t flex"
        style={{ background: C.cream, borderColor: C.line }}
      >
        {bottomNav.map(n => (
          <button
            key={n.id}
            onClick={() => onNavigate(n.id)}
            className="flex-1 flex flex-col items-center justify-center py-2 gap-0.5"
            style={{ color: currentPage === n.id ? C.coral : C.ink + '66', fontSize: 10, fontWeight: 500 }}
          >
            <span style={{ display: 'inline-flex' }}>{n.icon}</span>
            {n.label}
          </button>
        ))}
      </nav>
    </>
  );
}

// ── Footer ────────────────────────────────────────────
function Footer({ onNavigate }) {
  return (
    <footer style={{ background: C.blue, color: C.cream, paddingBottom: 80 }}>
      <div className="max-w-6xl mx-auto px-6 py-16">
        <div className="grid grid-cols-2 md:grid-cols-4 gap-8">
          <div className="col-span-2 md:col-span-1">

<script type="text/babel" data-presets="react" data-type="module">
// === wordle.jsx ===
// WORDLE — Tebak Kata Hari Ini playable mini game

const { useState: useWState, useEffect: useWEffect, useCallback: useWCallback } = React;

const C_W = window.C;

const CIVIC_WORDS = ['WARGA','SUARA','PASAL','SAKSI','DAPIL','KORUM','DEBAT','CALON','NEGRI'];
const TARGET_WORD = 'WARGA';

const CIVIC_FACTS = {
  WARGA: 'Warga negara Indonesia memiliki hak memilih sejak usia 17 tahun. Partisipasi aktif dalam demokrasi bukan sekadar hak — ini kewajiban bersama.',
  SUARA: 'Dalam sistem pemilu proporsional terbuka Indonesia, suara terbanyak pada caleg di sebuah dapil menentukan siapa yang melenggang ke parlemen.',
  PASAL: 'UUD 1945 memiliki 37 pasal. Pasal 28 A–J tentang Hak Asasi Manusia adalah produk amandemen 1999–2002 yang paling sering jadi dasar advokasi warga.',
  SAKSI: 'Setiap partai peserta pemilu berhak menempatkan saksi di TPS. Kehadiran saksi yang kompeten adalah garda pertama transparansi penghitungan suara.',
  DAPIL: 'Dapil (Daerah Pemilihan) menentukan berapa kursi DPR yang diperebutkan di sebuah wilayah. Semakin besar dapil, semakin proporsional hasilnya.',
};

const DEFAULT_FACT = 'Partisipasi warga yang aktif dan kritis adalah fondasi demokrasi yang sehat, akuntabel, dan berorientasi pada kepentingan publik.';

const KEYBOARD_ROWS = [
  ['Q','W','E','R','T','Y','U','I','O','P'],
  ['A','S','D','F','G','H','J','K','L'],
  ['ENTER','Z','X','C','V','B','N','M','⌫'],
];

function getTileStyle(status, revealed) {
  if (!revealed) return { background: 'transparent', color: C_W.blue, borderColor: C_W.line };
  const map = {
    correct: { background: C_W.mint,     color: '#fff', borderColor: C_W.mint },
    present: { background: C_W.marigold, color: '#fff', borderColor: C_W.marigold },
    absent:  { background: '#8A9099',    color: '#fff', borderColor: '#8A9099' },
  };
  return map[status] || { background: C_W.line, color: C_W.ink, borderColor: C_W.line };
}

function getKeyStyle(status) {
  const map = {
    correct: { background: C_W.mint,     color: '#fff' },
    present: { background: C_W.marigold, color: '#fff' },
    absent:  { background: '#8A9099',    color: '#fff' },
  };
  return map[status] || { background: C_W.line, color: C_W.ink };
}

function evaluateGuess(word, target) {
  const result = Array(5).fill('absent');
  const tArr = target.split('');
  const wArr = word.split('');
  for (let i = 0; i < 5; i++) {
    if (wArr[i] === tArr[i]) { result[i] = 'correct'; tArr[i] = null; wArr[i] = null; }
  }
  for (let i = 0; i < 5; i++) {
    if (wArr[i] !== null) {
      const idx = tArr.indexOf(wArr[i]);
      if (idx !== -1) { result[i] = 'present'; tArr[idx] = null; }
    }
  }
  return result;
}

function TebakKata({ onOpenPage, compact = false }) {
  const [guesses,    setGuesses]    = useWState([]);
  const [current,    setCurrent]    = useWState('');
  const [gameState,  setGameState]  = useWState('playing'); // 'playing'|'won'|'lost'
  const [shakeRow,   setShakeRow]   = useWState(false);
  const [revealRow,  setRevealRow]  = useWState(-1);
  const [keyStates,  setKeyStates]  = useWState({});
  const [streak,     setStreak]     = useWState(5);
  const [showResult, setShowResult] = useWState(false);
  const [popCol,     setPopCol]     = useWState(-1);

  const MAX = 6;
  const target = TARGET_WORD;

  const submit = useWCallback(() => {
    if (gameState !== 'playing') return;
    if (current.length !== 5) {
      setShakeRow(true);
      setTimeout(() => setShakeRow(false), 450);
      return;
    }
    const statuses  = evaluateGuess(current, target);
    const newGuess  = { word: current, statuses };
    const newGuesses = [...guesses, newGuess];
    setGuesses(newGuesses);
    setCurrent('');
    setRevealRow(newGuesses.length - 1);

    const nk = { ...keyStates };
    current.split('').forEach((ch, i) => {
      const s = statuses[i];
      const p = nk[ch];
      if (!p || (p === 'absent') || (p === 'present' && s === 'correct')) nk[ch] = s;
    });
    setKeyStates(nk);

    const won = current === target;
    const lost = !won && newGuesses.length >= MAX;
    if (won || lost) {
      setTimeout(() => {
        if (won) setStreak(s => s + 1);
        setShowResult(true);
        setGameState(won ? 'won' : 'lost');
      }, 5 * 200 + 400);
    }
  }, [current, guesses, keyStates, gameState, target]);

  const press = useWCallback((key) => {
    if (gameState !== 'playing') return;
    if (key === 'ENTER')   { submit(); return; }
    if (key === '⌫' || key === 'BACKSPACE') { setCurrent(c => c.slice(0, -1)); return; }
    if (/^[A-Z]$/.test(key) && current.length < 5) {
      setCurrent(c => c + key);
      setPopCol(current.length);
      setTimeout(() => setPopCol(-1), 120);
    }
  }, [current, gameState, submit]);

  useWEffect(() => {
    const handler = e => {
      const k = e.key.toUpperCase();
      if (k === 'ENTER' || k === 'BACKSPACE' || /^[A-Z]$/.test(k)) press(k);
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [press]);

  const resetGame = () => {
    setGuesses([]); setCurrent(''); setGameState('playing');
    setKeyStates({}); setRevealRow(-1); setShowResult(false);
  };

  const curRow = guesses.length;

  return (
    <div className="flex flex-col items-center gap-5 py-4 select-none" style={{ color: C_W.blue }}>
      {/* Header */}
      <div className="text-center">
        <h3 className="font-display font-bold text-xl" style={{ color: compact ? C_W.cream : C_W.blue }}>
          Tebak Kata Hari Ini
        </h3>
        <p className="text-xs mt-0.5" style={{ color: compact ? C_W.cream+'88' : C_W.ink+'77' }}>
          Tebak kata civic 5 huruf · 6 percobaan
        </p>
        <div className="mt-2 flex items-center justify-center gap-1.5">
          <span>🔥</span>
          <span className="font-mono font-bold" style={{ color: C_W.coral }}>{streak}</span>
          <span className="text-xs" style={{ color: compact ? C_W.cream+'66' : C_W.ink+'55' }}>hari berturut-turut</span>
        </div>
      </div>

      {/* Grid */}
      <div className="flex flex-col gap-1.5">
        {Array(MAX).fill(null).map((_, rowIdx) => {
          const guess     = guesses[rowIdx];
          const isCurrent = rowIdx === curRow && gameState === 'playing';
          const isShake   = isCurrent && shakeRow;
          return (
            <div key={rowIdx} className={`flex gap-1.5 ${isShake ? 'row-shake' : ''}`}>
              {Array(5).fill(null).map((_, colIdx) => {
                let letter = '', status = '', revealed = false;
                if (guess) { letter = guess.word[colIdx]; status = guess.statuses[colIdx]; revealed = true; }
                else if (isCurrent) letter = current[colIdx] || '';

                const isPopping = isCurrent && colIdx === popCol && !revealed;
                const flipDelay  = colIdx * 200;
                const shouldFlip = revealed && rowIdx === revealRow;
                const tileStyle  = getTileStyle(status, revealed);

                return (
                  <div
                    key={colIdx}
                    className={`wtile ${shouldFlip ? 'flip-tile' : ''} ${isPopping ? 'tile-pop' : ''}`}
                    style={{
                      ...tileStyle,
                      animationDelay: shouldFlip ? `${flipDelay}ms` : '0ms',
                      transform: letter && !revealed ? 'scale(1.06)' : 'scale(1)',
                      borderColor: letter && !revealed && !isPopping ? C_W.blue + 'AA' : tileStyle.borderColor,
                    }}
                  >
                    {letter}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>

      {/* Keyboard */}
      <div className="flex flex-col gap-1.5 w-full" style={{ maxWidth: 340 }}>
        {KEYBOARD_ROWS.map((row, ri) => (
          <div key={ri} className="flex gap-1 justify-center">
            {row.map(key => {
              const ks = keyStates[key];
              const w  = (key === 'ENTER' || key === '⌫') ? 'auto' : 30;
              const px = (key === 'ENTER' || key === '⌫') ? '10px' : '0';
              return (
                <button
                  key={key}
                  className="wkey"
                  style={{ ...getKeyStyle(ks), minWidth: w, paddingLeft: px, paddingRight: px }}
                  onClick={() => press(key)}
                >
                  {key}
                </button>
              );
            })}
          </div>
        ))}
      </div>

      {/* Result Modal */}
      {showResult && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
          <div className="absolute inset-0 backdrop-blur-sm" style={{ background: C_W.blue + '77' }} />
          <div className="relative rounded-2xl shadow-2xl p-8 max-w-sm w-full text-center" style={{ background: C_W.cream }}>
            <div className="text-5xl mb-3">{gameState === 'won' ? '🎉' : '😔'}</div>
            <h3 className="font-display text-2xl font-bold mb-1" style={{ color: C_W.blue }}>
              {gameState === 'won' ? 'Mantap, Warga!' : 'Coba lagi besok!'}
            </h3>
            <p className="text-sm mb-1" style={{ color: C_W.ink + '77' }}>Kata hari ini:</p>
            <p className="font-display text-3xl font-bold mb-4" style={{ color: C_W.coral }}>{target}</p>

            <div className="rounded-xl p-4 mb-5 text-left" style={{ background: C_W.blue + '0D', border: `1px solid ${C_W.line}` }}>
              <p className="text-xs font-semibold uppercase tracking-wider mb-2" style={{ color: C_W.blue }}>🧠 Tahukah kamu?</p>
              <p className="text-sm leading-relaxed" style={{ color: C_W.ink + 'CC' }}>
                {CIVIC_FACTS[target] || DEFAULT_FACT}
              </p>
            </div>

            {gameState === 'won' && (
              <div className="flex items-center justify-center gap-2 mb-4">
                <span>🔥</span>
                <span className="font-mono font-bold text-lg" style={{ color: C_W.coral }}>{streak}</span>
                <span className="text-sm" style={{ color: C_W.ink + '77' }}>hari berturut-turut!</span>
              </div>
            )}

            <div className="flex flex-col gap-2">
              {onOpenPage && (
                <>
                  <button
                    className="btn-base w-full py-2.5 rounded-xl font-semibold text-sm flex items-center justify-center gap-2"
                    style={{ background: C_W.blue, color: C_W.cream }}
                    onClick={() => onOpenPage('komunitas')}
                  >💬 Diskusi di Forum →</button>
                  <button
                    className="btn-base w-full py-2.5 rounded-xl font-semibold text-sm flex items-center justify-center gap-2 border-2"
                    style={{ borderColor: C_W.blue, color: C_W.blue }}
                    onClick={() => onOpenPage('kelas')}
                  >📚 Pelajari di Kelas →</button>
                </>
              )}
              <button className="text-xs mt-1" style={{ color: C_W.ink + '55' }} onClick={resetGame}>
                ↺ Reset (Demo)
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// Backward compat: keep both names exposed
const CitizenWordle = TebakKata;
Object.assign(window, { TebakKata, CitizenWordle });

</script>
<script type="text/babel" data-presets="react" data-type="module">
// === onboarding.jsx ===
// ONBOARDING — 3-step flow

const { useState: useOState } = React;
const CO = window.C;

const TOPICS = [
  { id:'politik',    label:'Politik 🏛️'       },
  { id:'lingkungan', label:'Lingkungan 🌱'     },
  { id:'gender',     label:'Gender 💜'         },
  { id:'mental',     label:'Mental Health 🧠'  },
  { id:'ekonomi',    label:'Ekonomi 💸'        },
  { id:'pendidikan', label:'Pendidikan ✏️'     },
  { id:'budaya',     label:'Budaya Pop 🎬'     },
  { id:'teknologi',  label:'Teknologi ⚙️'     },
  { id:'lokal',      label:'Komunitas Lokal 🏘️'},
];

const ENTRY_OPTIONS = [
  { id:'main',      icon:'🎮', label:'Main mini game dulu',    sub:'Mulai ringan, coba Citizen Wordle' },
  { id:'karya',     icon:'✍️', label:'Lihat karya orang lain', sub:'Baca opini, tonton vlog, telusuri ilustrasi' },

];

function Onboarding({ onComplete, onNavigate }) {
  const [step,       setStep]       = useOState(0);
  const [name,       setName]       = useOState('');
  const [kota,       setKota]       = useOState('');
  const [age,        setAge]        = useOState(22);
  const [topics,     setTopics]     = useOState([]);
  const [entryPoint, setEntryPoint] = useOState(null);

  const toggleTopic = id => {
    setTopics(prev =>
      prev.includes(id)
        ? prev.filter(t => t !== id)
        : prev.length < 5 ? [...prev, id] : prev
    );
  };

  const finish = () => {
    onComplete();
    if (entryPoint) onNavigate(entryPoint);
  };

  const dot = (i) => (
    <div
      key={i}
      className="rounded-full transition-all duration-300"
      style={{
        width:      step === i ? 24 : 8,
        height:     8,
        background: step === i ? CO.coral : CO.line,
      }}
    />
  );

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: CO.blue + 'EE' }}>
      <div className="relative rounded-2xl w-full max-w-md shadow-2xl overflow-hidden" style={{ background: CO.cream }}>

        {/* Progress dots */}
        <div className="flex items-center justify-center gap-2 pt-6 pb-0">
          {[0, 1, 2].map(i => dot(i))}
        </div>

        <div className="p-7">

          {/* ── STEP 0 ── */}
          {step === 0 && (
            <div>
              <div className="text-center mb-6">
                <div className="text-4xl mb-3">👋</div>
                <h2 className="font-display text-2xl font-bold" style={{ color: CO.blue }}>Halo, kenalan dulu.</h2>
                <p className="text-sm mt-2 leading-relaxed" style={{ color: CO.ink + '88' }}>
                  Datamu cuma kita pakai untuk bikin pengalaman lebih pas, bukan untuk dijual.{' '}
                  <span style={{ color: CO.coral }}>Janji.</span>
                </p>
              </div>

              <div className="space-y-4">
                <div>
                  <label className="block text-sm font-semibold mb-1.5" style={{ color: CO.ink }}>Nama kamu</label>
                  <input
                    value={name}
                    onChange={e => setName(e.target.value)}
                    placeholder="Mis: Aulia Pratiwi"
                    className="w-full px-4 py-2.5 rounded-xl border text-sm outline-none transition-colors"
                    style={{ borderColor: name ? CO.blue : CO.line, background: '#fff', color: CO.ink }}
                  />
                </div>
                <div>
                  <label className="block text-sm font-semibold mb-1.5" style={{ color: CO.ink }}>Kota kamu</label>
                  <input
                    value={kota}
                    onChange={e => setKota(e.target.value)}
                    placeholder="Mis: Bandung"
                    className="w-full px-4 py-2.5 rounded-xl border text-sm outline-none transition-colors"
                    style={{ borderColor: kota ? CO.blue : CO.line, background: '#fff', color: CO.ink }}
                  />
                </div>
                <div>
                  <label className="block text-sm font-semibold mb-1.5" style={{ color: CO.ink }}>
                    Umur:{' '}
                    <span className="font-mono" style={{ color: CO.coral }}>{age} tahun</span>
                  </label>
                  <input
                    type="range" min={17} max={39} value={age}
                    onChange={e => setAge(Number(e.target.value))}
                    className="w-full"
                  />
                  <div className="flex justify-between text-xs mt-1" style={{ color: CO.ink + '55' }}>
                    <span>17</span><span>39</span>
                  </div>
                </div>
              </div>

              <button
                onClick={() => setStep(1)}
                disabled={!name || !kota}
                className="btn-base w-full mt-6 py-3 rounded-xl font-semibold text-sm"
                style={{ background: CO.coral, color: '#fff', opacity: (!name || !kota) ? .4 : 1 }}
              >
                Lanjut →
              </button>
            </div>
          )}

          {/* ── STEP 1 ── */}
          {step === 1 && (
            <div>
              <div className="text-center mb-6">
                <div className="text-4xl mb-3">🔍</div>
                <h2 className="font-display text-2xl font-bold" style={{ color: CO.blue }}>Apa yang kamu peduli?</h2>
                <p className="text-sm mt-2" style={{ color: CO.ink + '88' }}>
                  Pilih <strong>2–5 topik</strong> yang paling penting buat kamu.
                </p>
              </div>

              <div className="flex flex-wrap gap-2 justify-center">
                {TOPICS.map(t => {
                  const sel = topics.includes(t.id);
                  return (
                    <button
                      key={t.id}
                      onClick={() => toggleTopic(t.id)}
                      className="px-4 py-2 rounded-xl text-sm font-medium transition-all border"
                      style={{
                        borderColor: sel ? CO.coral : CO.line,
                        background:  sel ? CO.coral : '#fff',
                        color:        sel ? '#fff'   : CO.ink,
                      }}
                    >
                      {t.label}
                    </button>
                  );
                })}
              </div>

              <p className="text-center text-xs mt-3" style={{ color: CO.ink + '55' }}>
                {topics.length}/5 dipilih
              </p>

              <div className="flex gap-3 mt-6">
                <button
                  onClick={() => setStep(0)}
                  className="btn-base flex-1 py-3 rounded-xl text-sm font-semibold border-2"
                  style={{ borderColor: CO.line, color: CO.ink + '88' }}
                >← Balik</button>
                <button
                  onClick={() => setStep(2)}
                  disabled={topics.length < 2}
                  className="btn-base flex-1 py-3 rounded-xl text-sm font-semibold"
                  style={{ background: CO.coral, color: '#fff', opacity: topics.length < 2 ? .4 : 1 }}
                >Lanjut →</button>
              </div>
            </div>
          )}

          {/* ── STEP 2 ── */}
          {step === 2 && (
            <div>
              <div className="text-center mb-6">
                <div className="text-4xl mb-3">🚪</div>
                <h2 className="font-display text-2xl font-bold" style={{ color: CO.blue }}>Pintu masuk kamu?</h2>
                <p className="text-sm mt-2" style={{ color: CO.ink + '88' }}>Mau mulai dari mana dulu?</p>

              <div className="space-y-3">
                {ENTRY_OPTIONS.map(opt => {
                  const sel = entryPoint === opt.id;
                  return (
                    <button
                      key={opt.id}
                      onClick={() => setEntryPoint(opt.id)}
                      className="w-full p-4 rounded-xl border text-left transition-all"
                      style={{
                        borderColor: sel ? CO.coral : CO.line,
                        background:  sel ? CO.coral + '11' : '#fff',
                      }}
                    >
                      <div className="flex items-center gap-3">
                        <span className="text-2xl">{opt.icon}</span>
                        <div>
                          <div className="font-semibold text-sm" style={{ color: CO.blue }}>{opt.label}</div>
                          <div className="text-xs mt-0.5" style={{ color: CO.ink + '66' }}>{opt.sub}</div>
                        </div>
                        {sel && <span className="ml-auto" style={{ color: CO.coral }}>✓</span>}
                      </div>
                    </button>
                  );
                })}
              </div>

              <div className="flex gap-3 mt-6">
                <button
                  onClick={() => setStep(1)}

<script type="text/babel" data-presets="react" data-type="module">
// === app.jsx ===
// APP — Main router & shell

const { useState: useAppState, useEffect: useAppEffect } = React;
const CApp = window.C;

// Pull in all page components + shared from window
const {
  Header, Footer, Onboarding,
  PageBeranda, PageKomunitas, PageKarya, PageKelas, PageAksi, PageMain, PageProfil,
  PageTagih, PageNala,
} = window;

function Toast({ message, onDone }) {
  useAppEffect(() => {
    const t = setTimeout(onDone, 3000);
    return () => clearTimeout(t);
  }, []);
  return (
    <div
      className="fixed top-20 left-1/2 z-50 px-5 py-3 rounded-xl shadow-xl text-sm font-medium flex items-center gap-2"
      style={{
        background: CApp.blue,
        color: CApp.cream,
        transform: 'translateX(-50%)',
        animation: 'none',
      }}
    >
      🎉 {message}
    </div>
  );
}

function App() {
  const [page,            setPage]           = useAppState('beranda');
  const [showOnboarding,  setShowOnboarding]  = useAppState(false);
  const [toast,           setToast]           = useAppState(null);

  const navigate = (p) => {
    setPage(p);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const completeOnboarding = () => {
    setShowOnboarding(false);
    setToast('Selamat datang di Jubir Warga! KTP Wargamu sudah siap.');
  };

  const PAGES = {
    beranda:   <PageBeranda   onNavigate={navigate} />,
    komunitas: <PageKomunitas onNavigate={navigate} />,
    karya:     <PageKarya     onNavigate={navigate} />,
    kelas:     <PageKelas     onNavigate={navigate} />,
    aksi:      <PageAksi      onNavigate={navigate} />,
    tagih:     <PageTagih     onNavigate={navigate} />,
    main:      <PageMain      onNavigate={navigate} />,
    nala:      <PageNala      onNavigate={navigate} />,
    profil:    <PageProfil    onNavigate={navigate} />,
  };

  return (
    <div style={{ background: CApp.cream, minHeight: '100vh' }}>

      {/* Onboarding overlay */}
      {showOnboarding && (
        <Onboarding
          onComplete={completeOnboarding}
          onNavigate={(p) => { completeOnboarding(); navigate(p); }}
        />
      )}

      {/* Welcome toast */}
      {toast && <Toast message={toast} onDone={() => setToast(null)} />}

      {/* Header */}
      <Header currentPage={page} onNavigate={navigate} />

      {/* Page content */}
      <main style={{ paddingBottom: 80 }}>
        {PAGES[page] || PAGES.beranda}
      </main>

      {/* Footer */}
      <Footer onNavigate={navigate} />

      {/* Floating "baru di sini?" prompt — only on Beranda */}
      {page === 'beranda' && !showOnboarding && (
        <button
          onClick={() => setShowOnboarding(true)}
          className="fixed bottom-24 md:bottom-8 left-4 md:left-6 z-30 flex items-center gap-2 px-4 py-2.5 rounded-xl shadow-lg text-sm font-semibold transition-all hover:scale-105 active:scale-95"
          style={{ background: CApp.blue, color: CApp.cream }}
        >
          👋 Baru di sini? Mulai onboarding
        </button>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
