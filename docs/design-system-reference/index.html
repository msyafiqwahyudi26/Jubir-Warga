  <meta charset="utf-8"/>
  <title>Jubir Warga — UI Kit</title>
  <meta name="viewport" content="width=1280"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Vollkorn:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Caveat:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../colors_and_type.css"/>
  <style>
    *{box-sizing:border-box}
    body{margin:0; background:#FFFAEE; color:#2A2D3A; font-family:Inter,sans-serif;}
    h1,h2,h3,h4{margin:0}
    p{margin:0}
    button{font:inherit}
    .btn{transition: transform .12s ease, box-shadow .12s ease, background .12s ease;}
    .btn:hover{transform: translateY(-1px); box-shadow: 0 4px 12px rgba(26,34,86,.15);}
    .btn:active{transform: translateY(0);}
    .card-lift{transition: transform .15s ease, box-shadow .15s ease;}
    .card-lift:hover{transform: translateY(-3px); box-shadow: 0 12px 28px -8px rgba(26,34,86,.18);}
    em { font-style: italic; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="BerandaIllustrations.jsx"></script>
  <script type="text/babel" src="TagihIllustrations.jsx"></script>
  <script type="text/babel" src="PageBeranda.jsx"></script>
  <script type="text/babel" src="PageTagih.jsx"></script>
  <script type="text/babel" src="PageAksi.jsx"></script>
  <script type="text/babel" src="PageNala.jsx"></script>
  <script type="text/babel" src="PageProfil.jsx"></script>
  <script type="text/babel" src="AIPanel.jsx"></script>

  <script type="text/babel">
    const { useState } = React;
    function App() {
      const [page, setPage] = useState('beranda');
      const [aiOpen, setAiOpen] = useState(false);
      return (
        <>
          <Header page={page} onNav={setPage} onJubir={() => setAiOpen(true)} />
          <main>
            {page === 'beranda' && <PageBeranda onNav={setPage} onJubir={() => setAiOpen(true)} />}
            {page === 'tagih'   && <PageTagih onNav={setPage} />}
            {page === 'aksi'    && <PageAksi onNav={setPage} />}
            {page === 'nala'    && <PageNala onNav={setPage} />}
            {page === 'profil'  && <PageProfil onNav={setPage} />}
            {!['beranda','tagih','aksi','nala','profil'].includes(page) && <PlaceholderPage page={page} />}
          </main>
          <Footer />
          <AIPanel open={aiOpen} onClose={() => setAiOpen(false)} />
        </>
      );
    }
    function PlaceholderPage({ page }) {
      const labels = {komunitas:'Komunitas',karya:'Karya',kelas:'Kelas',aksi:'Aksi',main:'Main'};
      return (
        <div style={{ padding:'120px 24px', textAlign:'center', minHeight:480 }}>
          <h1 style={{ font:'700 56px Vollkorn,serif', color:'#1A2256' }}><em>{labels[page]}</em></h1>
          <p style={{ marginTop:14, color:'#6B6860' }}>Halaman ini ada di prototipe lengkap. Kembali ke <a onClick={()=>{}} style={{color:'#E8632B',cursor:'pointer'}}>Beranda</a>, atau lihat <a style={{color:'#E8632B',cursor:'pointer'}}>Tagih Janji</a> & <a style={{color:'#E8632B',cursor:'pointer'}}>Profil</a> sebagai contoh page lengkap.</p>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
