# Auto-deploy ke VPS jubir.spdindonesia.org saat push ke main
# Phase 1: deploys apps/legacy/ ke jubir.spdindonesia.org (vanilla site)
# Phase 2 (Next.js) akan punya workflow terpisah ke domain berbeda
name: Deploy Legacy to VPS

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/legacy/**'
      - '.github/workflows/deploy.yml'
      - 'deploy/nginx-jubirwarga.conf'
  workflow_dispatch:  # Bisa trigger manual dari GitHub Actions UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 76.13.196.172 >> ~/.ssh/known_hosts
          ssh-keyscan -H jubir.spdindonesia.org >> ~/.ssh/known_hosts || true

      - name: Sync apps/legacy/ ke VPS
        run: |
          rsync -avz --delete \
            --exclude='node_modules' \
            apps/legacy/ root@76.13.196.172:/var/www/jubirwarga/

      - name: Reload nginx
        run: |
          ssh root@76.13.196.172 'nginx -t && systemctl reload nginx'

      - name: Notify success
        if: success()
        run: echo "✅ Phase 1 (legacy) ke jubir.spdindonesia.org berhasil"
