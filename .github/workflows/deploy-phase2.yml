# Auto-deploy Phase 2 (Next.js) ke VPS jubir.spdindonesia.org saat push ke main.
# Phase 1 deploy workflow tetap di .github/workflows/deploy.yml (legacy/mockup).
#
# Path: /var/www/jubir-warga-phase2 di VPS 76.13.196.172
# Pattern follows webfactory/ssh-agent (consistent dengan deploy.yml Phase 1).
#
# Required GitHub secrets (already exist for Phase 1, reuse):
#   VPS_SSH_KEY  — SSH private key with access to root@76.13.196.172
#   VPS_HOST     — 76.13.196.172 (or hostname alias)
#   VPS_USER     — root
#
# Manual trigger: Repo → Actions → "Deploy Phase 2 to VPS" → Run workflow.
name: Deploy Phase 2 to VPS

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/data/**'
      - 'deploy/phase2/**'
      - '.github/workflows/deploy-phase2.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          ssh-keyscan -H jubir.spdindonesia.org >> ~/.ssh/known_hosts || true

      - name: Deploy via SSH
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" <<'ENDSSH'
            set -euo pipefail
            cd /var/www/jubir-warga-phase2

            echo "→ Pull latest"
            git fetch origin main
            git reset --hard origin/main

            echo "→ Install dependencies"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            nvm use 20.11
            pnpm install --frozen-lockfile

            echo "→ Build apps/web"
            pnpm --filter @jw/web build

            echo "→ Restart PM2"
            pm2 restart jubir-warga-phase2 --update-env
            pm2 save

            echo "→ Health check (local PM2)"
            sleep 3
            curl --fail --retry 3 --retry-delay 2 --max-time 10 -I http://localhost:3001 \
              || (echo "✗ Local health check failed (PM2 not responding)"; exit 1)

            echo "✓ Local check OK — PM2 alive"
          ENDSSH

      - name: Public HTTPS health check
        run: |
          echo "→ Verifying https://jubir.spdindonesia.org reachable + 200"
          curl --fail --retry 5 --retry-delay 3 --max-time 15 -sS -o /dev/null \
               -w "HTTP %{http_code} · %{time_total}s · ssl_verify=%{ssl_verify_result}\n" \
               https://jubir.spdindonesia.org \
            || (echo "✗ Public HTTPS health check failed — Nginx/SSL/Node down. Cek log VPS."; exit 1)
          echo "✓ Public endpoint healthy"

      - name: Notify success
        if: success()
        run: echo "✅ Phase 2 (Next.js) deployed ke jubir.spdindonesia.org"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Phase 2 deploy gagal — cek log job di atas"
          echo "Rollback: SSH ke VPS, cd /var/www/jubir-warga-phase2, git reset --hard <prev-sha>, rebuild, pm2 restart"
