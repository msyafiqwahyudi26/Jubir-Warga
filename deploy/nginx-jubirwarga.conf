# /etc/nginx/sites-available/jubirwarga
# Production-grade config: gzip, cache strategy, security headers
server {
    listen 80;
    listen [::]:80;
    server_name jubir.spdindonesia.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jubir.spdindonesia.org;

    ssl_certificate     /etc/letsencrypt/live/jubir.spdindonesia.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jubir.spdindonesia.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/jubirwarga;
    index index.html;

    # ── Gzip compression (text formats) ─────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/atom+xml
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # ── Cache strategy ──────────────────────────────────────
    # Static images/fonts → long cache (1 month immutable)
    location ~* \.(jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable, max-age=2592000";
        access_log off;
    }

    # JS/CSS/JSX (we use ?v=N cache buster di index.html, jadi safe long-cache)
    location ~* \.(js|jsx|css|json)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # PWA service worker — selalu fresh, jangan cache
    location = /public/service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    # PWA manifest — short cache
    location = /public/manifest.json {
        add_header Cache-Control "public, max-age=3600";
    }

    # index.html — no-cache (dapat HTML terbaru, tapi JS files dengan ?v= akan tetap cached)
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        expires off;
    }

    # SPA fallback — semua URL tidak dikenal → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ────────────────────────────────────
    add_header X-Frame-Options              "SAMEORIGIN" always;
    add_header X-Content-Type-Options       "nosniff" always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy           "geolocation=(), camera=(), microphone=()" always;
    # CSP — relaxed untuk CDN-based stack sekarang. Phase 2 (Next.js) tighten lebih lanjut.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.tailwindcss.com https://*.sentry.io https://plausible.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.sentry.io https://plausible.io https://*.supabase.co; frame-ancestors 'none';" always;

    # ── Compression: also serve pre-compressed Brotli files if exist ──
    # (Opsional — perlu install nginx-module-brotli + bikin .br files)
    # brotli_static on;

    # ── Logs ────────────────────────────────────────────────
    access_log /var/log/nginx/jubirwarga.access.log;
    error_log  /var/log/nginx/jubirwarga.error.log warn;
}
