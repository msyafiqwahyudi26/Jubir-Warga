# /etc/nginx/sites-available/glitchtip
# Reverse proxy: glitchtip.spdindonesia.org → 127.0.0.1:8000 (Docker)
#
# Pre-deploy:
#   1. DNS A record glitchtip.spdindonesia.org → 76.13.196.172 (Mas via DNS provider)
#   2. cp glitchtip.conf /etc/nginx/sites-available/glitchtip
#   3. ln -s /etc/nginx/sites-available/glitchtip /etc/nginx/sites-enabled/
#   4. nginx -t
#   5. certbot --nginx -d glitchtip.spdindonesia.org  (auto-inject SSL block)
#   6. systemctl reload nginx

# HTTP → HTTPS (certbot tambah baris ini juga, idempotent)
server {
    listen 80;
    listen [::]:80;
    server_name glitchtip.spdindonesia.org;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main vhost
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name glitchtip.spdindonesia.org;

    # SSL — certbot inject 4 baris berikut otomatis:
    # ssl_certificate     /etc/letsencrypt/live/glitchtip.spdindonesia.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/glitchtip.spdindonesia.org/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Body size — error event payload bisa besar (stack trace + breadcrumb + source map)
    client_max_body_size 50M;

    # Timeout — source map upload via Sentry CLI bisa makan waktu
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    proxy_connect_timeout 30s;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket (kalau GlitchTip enable real-time event stream)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options              "SAMEORIGIN" always;
    add_header X-Content-Type-Options       "nosniff" always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains" always;

    # Logs
    access_log /var/log/nginx/glitchtip.access.log;
    error_log  /var/log/nginx/glitchtip.error.log warn;
}
