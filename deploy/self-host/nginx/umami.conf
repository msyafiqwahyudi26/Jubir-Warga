# /etc/nginx/sites-available/umami
# Reverse proxy: umami.spdindonesia.org → 127.0.0.1:3000 (Docker)
#
# Pre-deploy:
#   1. DNS A record umami.spdindonesia.org → 76.13.196.172 (Mas via DNS provider)
#   2. cp umami.conf /etc/nginx/sites-available/umami
#   3. ln -s /etc/nginx/sites-available/umami /etc/nginx/sites-enabled/
#   4. nginx -t
#   5. certbot --nginx -d umami.spdindonesia.org  (auto-inject SSL block)
#   6. systemctl reload nginx

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name umami.spdindonesia.org;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main vhost
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name umami.spdindonesia.org;

    # SSL — certbot inject 4 baris berikut otomatis:
    # ssl_certificate     /etc/letsencrypt/live/umami.spdindonesia.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/umami.spdindonesia.org/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Body size — analytics payload kecil
    client_max_body_size 1M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;

        # Umami response time biasanya <100ms
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # CORS — supaya tracking script bisa dipanggil dari jubir.spdindonesia.org domain
    # (Umami default sudah handle via Origin check, tapi defense-in-depth)
    location ~ ^/(api/send|script\.js)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long cache untuk script.js (versioned via Umami release)
        location = /script.js {
            proxy_pass http://127.0.0.1:3000/script.js;
            proxy_set_header Host $host;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options              "SAMEORIGIN" always;
    add_header X-Content-Type-Options       "nosniff" always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains" always;

    # Logs
    access_log /var/log/nginx/umami.access.log;
    error_log  /var/log/nginx/umami.error.log warn;
}
