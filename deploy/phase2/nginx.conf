# /etc/nginx/sites-available/jubir-warga-phase2
# Phase 2 (Next.js) — reverse proxy ke localhost:3001 + SSL via certbot.
# Co-exists dengan Phase 1 vhost (jubir.spdindonesia.org → /var/www/jubirwarga).
#
# Note: certbot --nginx -d jubirbetaapp.spdindonesia.org akan auto-inject
# baris ssl_certificate + ssl_certificate_key + listen 443 ssl http2.
# Skeleton di bawah pre-format-nya certbot agar diff minimal.

# HTTP → HTTPS redirect (certbot tambah baris ini juga, idempotent)
server {
    listen 80;
    listen [::]:80;
    server_name jubirbetaapp.spdindonesia.org;

    # ACME challenge untuk certbot (sebelum SSL issued)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main vhost
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jubirbetaapp.spdindonesia.org;

    # SSL — certbot akan inject 4 baris berikut saat issue cert pertama kali:
    # ssl_certificate     /etc/letsencrypt/live/jubirbetaapp.spdindonesia.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/jubirbetaapp.spdindonesia.org/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Reverse proxy ke Next.js (PM2 listens on 3001) ─────────
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # WebSocket upgrade (Next.js HMR di dev, future Realtime di prod)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_cache_bypass $http_upgrade;

        # Timeout reasonable untuk Server Actions (mis. Sentry source map upload)
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Static assets dari Next.js (_next/static immutable) ────
    # Next.js sudah hash filename, safe untuk long cache.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Public assets (manifest, icons, sprite-sheet) ──────────
    location ~* \.(jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot)$ {
        proxy_pass http://127.0.0.1:3001;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ── Gzip ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/atom+xml
        application/rss+xml
        image/svg+xml;

    # ── Security headers ────────────────────────────────────────
    # Note: Next.js juga set X-Frame-Options / X-Content-Type-Options / Referrer-Policy
    # via next.config.ts headers(). Nginx-level di sini idempotent + defense-in-depth.
    # Browser pakai stricter dari kedua source — duplicate aman.
    add_header X-Frame-Options              "SAMEORIGIN" always;
    add_header X-Content-Type-Options       "nosniff" always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy           "geolocation=(), camera=(), microphone=()" always;
    add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains" always;

    # CSP — relaxed untuk Sentry + Plausible + Supabase. Tighten Sprint 4.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.sentry.io https://plausible.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://*.sentry.io https://plausible.io https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none';" always;

    # ── Logs ────────────────────────────────────────────────────
    access_log /var/log/nginx/jubir-warga-phase2.access.log;
    error_log  /var/log/nginx/jubir-warga-phase2.error.log warn;

    # ── Body size — Server Actions + image upload Phase 4+ ─────
    client_max_body_size 10M;
}
